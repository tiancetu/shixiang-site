    <h1>妙理相册支持</h1>
    <p class="lead">常见问题和上架后的支持入口。</p>

    <section class="panel">
      <h2>照片会被上传吗？</h2>
      <p>不会。妙理相册的分类、OCR、图像标签和索引都在本机完成。</p>
    </section>

    <section class="panel">
      <h2>为什么需要照片权限？</h2>
      <p>妙理相册需要读取你授权的照片库，才能进行分类、搜索、识别和清理建议。你可以在 iOS 设置中随时撤销权限。</p>
    </section>

    <section class="panel">
      <h2>删除照片安全吗？</h2>
      <p>妙理相册只会删除你手动选择并二次确认的照片。删除动作由系统照片库完成，被删除的照片通常会进入系统“最近删除”。</p>
    </section>

    <section class="panel">
      <h2>联系开发者</h2>
      <p>你可以通过以下邮箱联系开发者。</p>
      <p><strong>支持邮箱：</strong>tbz365@qq.com</p>
    </section>
